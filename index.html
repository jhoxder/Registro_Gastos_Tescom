<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TESCOM · Registro de gastos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3F1EC;
    --surface:#FFFFFF;
    --ink:#20261F;
    --muted:#68706A;
    --line:#E2DFD5;
    --accent:#2F5D46;      /* verde agro/hardware */
    --accent-ink:#FFFFFF;
    --rust:#B85C2E;        /* terracota, uso puntual */
    --amber:#B8842C;
    --danger:#AC3F2E;
    --success:#2F7D4F;
    --radius:10px;
    --seg-1:#2F5D46; --seg-2:#B85C2E; --seg-3:#8A6D3B; --seg-4:#3E5C76; --seg-5:#6B7A3A;
    font-family: 'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);}
  body{-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Space Grotesk', system-ui, sans-serif; margin:0;}
  .mono{font-family:'IBM Plex Mono', monospace;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}
  :focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  .app{max-width:1280px;margin:0 auto;padding:28px 20px 60px;}

  header.top{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--line);}
  header.top .brand-eyebrow{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  header.top h1{font-size:26px;font-weight:700;color:var(--ink);}
  .stats{display:flex;gap:14px;flex-wrap:wrap;}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px 16px;min-width:150px;}
  .stat .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
  .stat .value{font-family:'Space Grotesk';font-size:20px;font-weight:600;margin-top:2px;}

  .layout{display:grid;grid-template-columns:1.35fr 1fr;gap:20px;align-items:start;}
  @media (max-width:980px){ .layout{grid-template-columns:1fr;} }

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;}
  .panel h2{font-size:16px;font-weight:600;margin-bottom:14px;}

  .field-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px 14px;}
  @media (max-width:640px){ .field-grid{grid-template-columns:1fr 1fr;} }
  .field-grid .span-3{grid-column:1 / -1;}
  .field-grid .span-2{grid-column:span 2;}
  @media (max-width:640px){ .field-grid .span-2{grid-column:1 / -1;} }

  label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
  .field input[type=text],
  .field input[type=number],
  .field input[type=date],
  .field select,
  .field textarea{
    width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:7px;background:#FBFAF7;
    font-size:13.5px;color:var(--ink);
  }
  .field input:focus,.field select:focus,.field textarea:focus{background:#fff;}
  .field textarea{resize:vertical;min-height:56px;}

  .checks{display:flex;gap:16px;flex-wrap:wrap;margin-top:2px;}
  .check-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink);}
  .check-item input{width:16px;height:16px;}

  .section-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--ink);margin:22px 0 4px;padding-top:16px;border-top:1px solid var(--line);}

  .dist-block{margin-top:14px;}
  .dist-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .dist-head .dim-label{font-size:13.5px;font-weight:600;}
  .dist-head .dim-total{font-size:12px;font-family:'IBM Plex Mono';padding:2px 8px;border-radius:20px;background:#EFEDE5;color:var(--muted);}
  .dist-head .dim-total.ok{background:#E4F0E7;color:var(--success);}
  .dist-head .dim-total.bad{background:#F5E6DC;color:var(--rust);}

  .split-bar{height:8px;border-radius:5px;overflow:hidden;background:#EFEDE5;display:flex;margin-bottom:10px;}
  .split-bar span{height:100%;}

  .dist-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;}
  .dist-row select{flex:1;padding:8px 9px;border:1px solid var(--line);border-radius:7px;background:#FBFAF7;font-size:13px;}
  .dist-row .pct-wrap{position:relative;width:88px;flex-shrink:0;}
  .dist-row .pct-wrap input{width:100%;padding:8px 22px 8px 9px;border:1px solid var(--line);border-radius:7px;background:#FBFAF7;font-size:13px;text-align:right;}
  .dist-row .pct-wrap span{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);}
  .dist-row button.remove{border:none;background:none;color:var(--muted);font-size:16px;width:26px;height:26px;border-radius:6px;flex-shrink:0;}
  .dist-row button.remove:hover{background:#F5E6DC;color:var(--danger);}

  .btn-add{border:1px dashed var(--line);background:none;color:var(--muted);font-size:12.5px;padding:6px 10px;border-radius:7px;margin-top:2px;}
  .btn-add:hover{border-color:var(--accent);color:var(--accent);}
  .btn-add:disabled{opacity:.4;cursor:not-allowed;}

  .actions{display:flex;align-items:center;gap:14px;margin-top:22px;padding-top:18px;border-top:1px solid var(--line);}
  .btn-primary{background:var(--accent);color:var(--accent-ink);border:none;padding:11px 22px;border-radius:8px;font-size:14px;font-weight:600;}
  .btn-primary:hover{background:#254a39;}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;}
  .btn-secondary{background:none;border:1px solid var(--line);padding:10px 16px;border-radius:8px;font-size:13.5px;color:var(--ink);}
  .btn-secondary:hover{border-color:var(--accent);color:var(--accent);}

  #statusMsg{font-size:13px;}
  #statusMsg.err{color:var(--danger);}
  #statusMsg.ok{color:var(--success);}
  .err-list{background:#F5E6DC;border:1px solid #E4C3AC;border-radius:8px;padding:10px 14px;margin-top:14px;font-size:13px;color:#7A3620;}
  .err-list ul{margin:4px 0 0;padding-left:18px;}

  .recent-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  table.recent{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.recent th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:0 8px 8px;border-bottom:1px solid var(--line);font-weight:600;}
  table.recent td{padding:9px 8px;border-bottom:1px solid #F0EEE7;vertical-align:top;}
  table.recent tr:last-child td{border-bottom:none;}
  .codigo{font-family:'IBM Plex Mono';font-weight:600;color:var(--accent);}
  .badge{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:20px;background:#EFEDE5;color:var(--muted);}
  .empty-state{color:var(--muted);font-size:13px;padding:20px 4px;text-align:center;}

  .login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .login-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:32px;width:100%;max-width:360px;}
  .login-card .brand-eyebrow{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  .login-card h1{font-size:20px;margin-bottom:6px;}
  .login-card .sub{font-size:13px;color:var(--muted);margin-bottom:22px;}
  .login-card .field{margin-bottom:14px;}
  .login-card button[type=submit]{width:100%;margin-top:4px;}
  .login-error{color:var(--danger);font-size:13px;margin-top:12px;min-height:16px;}

  .user-bar{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--muted);}
  .user-bar .btn-secondary{padding:7px 12px;font-size:12.5px;}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="brand-eyebrow">TESCOM</div>
    <h1>Iniciar sesión</h1>
    <div class="sub">Ingresa con el usuario que te crearon en Supabase.</div>
    <form id="loginForm" novalidate>
      <div class="field">
        <label for="login_email">Correo</label>
        <input type="email" id="login_email" required autocomplete="username">
      </div>
      <div class="field">
        <label for="login_password">Contraseña</label>
        <input type="password" id="login_password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="btnLogin">Iniciar sesión</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>

<div class="app" id="appRoot" style="display:none;">

  <header class="top">
    <div>
      <div class="brand-eyebrow">TESCOM</div>
      <h1>Registro de gastos</h1>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="label">Gastos este mes</div>
        <div class="value mono" id="statCount">—</div>
      </div>
      <div class="stat">
        <div class="label">Total registrado</div>
        <div class="value mono" id="statTotal">—</div>
      </div>
      <div class="user-bar">
        <span id="userEmail"></span>
        <button type="button" class="btn-secondary" id="btnLogout">Salir</button>
      </div>
    </div>
  </header>

  <div class="layout">

    <!-- ===================== FORMULARIO DE CAPTURA ===================== -->
    <section class="panel">
      <h2>Nuevo gasto</h2>
      <form id="gastoForm" novalidate>

        <div class="field-grid">
          <div class="field">
            <label for="f_semana">Semana</label>
            <input type="number" id="f_semana" min="1" max="53">
          </div>
          <div class="field">
            <label for="f_fecha_registro">Fecha de registro</label>
            <input type="date" id="f_fecha_registro">
          </div>
          <div class="field">
            <label for="f_fecha_pago_prog">Fecha pago programado</label>
            <input type="date" id="f_fecha_pago_prog">
          </div>

          <div class="field">
            <label for="f_proyecto">Proyecto</label>
            <input type="text" id="f_proyecto" placeholder="Opcional">
          </div>
          <div class="field">
            <label for="f_tipo">Tipo de gasto</label>
            <select id="f_tipo"><option value="">Seleccionar…</option></select>
          </div>
          <div class="field">
            <label for="f_concepto">Concepto</label>
            <select id="f_concepto"><option value="">Seleccionar tipo primero</option></select>
          </div>

          <div class="field span-3">
            <label for="f_detalle">Detalle</label>
            <textarea id="f_detalle" placeholder="Ej. Pago de local Santa Ana"></textarea>
          </div>

          <div class="field">
            <label for="f_valor_total">Valor total (USD)</label>
            <input type="number" id="f_valor_total" min="0" step="0.01" placeholder="0.00">
          </div>
          <div class="field span-2">
            <label>Impuestos</label>
            <div class="checks">
              <label class="check-item"><input type="checkbox" id="f_fondocoop"> Fondocoop</label>
              <label class="check-item"><input type="checkbox" id="f_iva"> IVA incluido</label>
              <label class="check-item"><input type="checkbox" id="f_renta"> Renta</label>
              <label class="check-item"><input type="checkbox" id="f_otros_imp"> Otros</label>
            </div>
          </div>

          <div class="field">
            <label for="f_forma_pago">Forma de pago</label>
            <select id="f_forma_pago"><option value="">Seleccionar…</option></select>
          </div>
          <div class="field">
            <label for="f_a_quien">A quién se le abonó</label>
            <input type="text" id="f_a_quien">
          </div>
          <div class="field">
            <label for="f_proveedor">Proveedor</label>
            <input type="text" id="f_proveedor">
          </div>

          <div class="field">
            <label for="f_estado">Estado</label>
            <select id="f_estado"><option value="">Seleccionar…</option></select>
          </div>
          <div class="field span-2">
            <label for="f_estatus">Estatus</label>
            <select id="f_estatus"><option value="">Seleccionar…</option></select>
          </div>
        </div>

        <!-- ===================== DISTRIBUCIÓN POR PORCENTAJES ===================== -->
        <div class="section-title">Distribución del gasto</div>
        <div id="distContainer"></div>

        <div class="actions">
          <button type="submit" class="btn-primary" id="btnGuardar">Guardar gasto</button>
          <button type="button" class="btn-secondary" id="btnLimpiar">Limpiar</button>
          <span id="statusMsg" aria-live="polite"></span>
        </div>

        <div id="errList" class="err-list" style="display:none;"></div>
      </form>
    </section>

    <!-- ===================== ÚLTIMOS GASTOS ===================== -->
    <section class="panel">
      <div class="recent-head">
        <h2>Últimos gastos</h2>
        <button type="button" class="btn-secondary" id="btnRefresh">Actualizar</button>
      </div>
      <table class="recent">
        <thead>
          <tr><th>Código</th><th>Detalle</th><th>Valor</th><th>Estado</th></tr>
        </thead>
        <tbody id="recentBody">
          <tr><td colspan="4" class="empty-state">Cargando…</td></tr>
        </tbody>
      </table>
    </section>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// =====================================================================
// CONFIGURA AQUÍ tus credenciales de Supabase (Project Settings > API)
// =====================================================================
const SUPABASE_URL = 'https://vfrysdtutjcwnzoukwea.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_uZyEjpZEpX1yykpH-q4FeA_GSiKeIg_';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Dimensiones de distribución: clave interna, tabla, columna FK y catálogo relacionado
const DIMENSIONS = [
  { key: 'area',      label: 'Área',      table: 'tescom_gastos_areas',     fk: 'area_id',     catalog: 'areas' },
  { key: 'sede',       label: 'Sede',       table: 'tescom_gastos_sedes',     fk: 'sede_id',     catalog: 'sedes' },
  { key: 'grupo',      label: 'Grupo',      table: 'tescom_gastos_grupos',    fk: 'grupo_id',    catalog: 'grupos' },
  { key: 'cargado_a',  label: 'Cargado a',  table: 'tescom_gastos_cargado_a',  fk: 'entidad_id',  catalog: 'entidades' },
];
const SEG_COLORS = ['var(--seg-1)','var(--seg-2)','var(--seg-3)','var(--seg-4)','var(--seg-5)'];

let catalogs = { tipos: [], areas: [], sedes: [], grupos: [], entidades: [], formasPago: [], estados: [], estatus: [] };
let distState = {}; // { area: [{id:'', pct:''}], sede: [...], ... }

function resetDistState(){
  distState = {};
  DIMENSIONS.forEach(d => { distState[d.key] = [{ id: '', pct: '' }]; });
}
resetDistState();

const $ = sel => document.querySelector(sel);
const money = n => new Intl.NumberFormat('es-SV', { style:'currency', currency:'USD' }).format(n || 0);

function setStatus(msg, type){
  const el = $('#statusMsg');
  el.textContent = msg || '';
  el.className = type || '';
}

// =====================================================================
// CARGA DE CATÁLOGOS
// =====================================================================
async function loadCatalogs(){
  const [tipos, areas, sedes, grupos, entidades, formasPago, estados, estatus] = await Promise.all([
    sb.from('tescom_tipos_gasto').select('id, nombre, tescom_conceptos_gasto(id, nombre)').eq('activo', true).order('orden'),
    sb.from('tescom_areas').select('id, nombre').eq('activo', true).order('nombre'),
    sb.from('tescom_sedes').select('id, nombre').eq('activo', true).order('nombre'),
    sb.from('tescom_grupos').select('id, nombre').eq('activo', true).order('nombre'),
    sb.from('tescom_entidades').select('id, nombre').eq('activo', true).order('nombre'),
    sb.from('tescom_formas_pago').select('id, nombre').eq('activo', true).order('nombre'),
    sb.from('tescom_estados').select('id, nombre').eq('activo', true).order('orden'),
    sb.from('tescom_estatus').select('id, nombre').eq('activo', true).order('orden'),
  ]);

  for (const r of [tipos, areas, sedes, grupos, entidades, formasPago, estados, estatus]){
    if (r.error) throw r.error;
  }

  catalogs.tipos = tipos.data || [];
  catalogs.areas = areas.data || [];
  catalogs.sedes = sedes.data || [];
  catalogs.grupos = grupos.data || [];
  catalogs.entidades = entidades.data || [];
  catalogs.formasPago = formasPago.data || [];
  catalogs.estados = estados.data || [];
  catalogs.estatus = estatus.data || [];

  fillSelect('#f_tipo', catalogs.tipos);
  fillSelect('#f_forma_pago', catalogs.formasPago);
  fillSelect('#f_estado', catalogs.estados);
  fillSelect('#f_estatus', catalogs.estatus);
  fillConceptos([]);
}

function fillSelect(selector, items, placeholder){
  const sel = $(selector);
  const ph = placeholder || 'Seleccionar…';
  sel.innerHTML = `<option value="">${ph}</option>` + items.map(i => `<option value="${i.id}">${i.nombre}</option>`).join('');
}

function fillConceptos(conceptos){
  fillSelect('#f_concepto', conceptos, conceptos.length ? 'Seleccionar…' : 'Seleccionar tipo primero');
}

$('#f_tipo').addEventListener('change', e => {
  const tipo = catalogs.tipos.find(t => String(t.id) === e.target.value);
  fillConceptos(tipo ? (tipo.tescom_conceptos_gasto || []) : []);
});

// =====================================================================
// BLOQUES DE DISTRIBUCIÓN (área / sede / grupo / cargado a)
// =====================================================================
function catalogFor(dim){ return catalogs[dim.catalog] || []; }

function renderDist(){
  const container = $('#distContainer');
  container.innerHTML = '';
  DIMENSIONS.forEach(dim => container.appendChild(buildDistBlock(dim)));
}

function buildDistBlock(dim){
  const rows = distState[dim.key];
  const total = rows.reduce((s, r) => s + (parseFloat(r.pct) || 0), 0);
  const items = catalogFor(dim);

  const block = document.createElement('div');
  block.className = 'dist-block';

  const head = document.createElement('div');
  head.className = 'dist-head';
  const totalClass = Math.abs(total - 100) < 0.05 ? 'ok' : (total > 0 ? 'bad' : '');
  head.innerHTML = `<span class="dim-label">${dim.label}</span><span class="dim-total ${totalClass}">${total.toFixed(1)}%</span>`;
  block.appendChild(head);

  const bar = document.createElement('div');
  bar.className = 'split-bar';
  rows.forEach((r, i) => {
    if (!r.pct) return;
    const seg = document.createElement('span');
    seg.style.width = Math.min(parseFloat(r.pct) || 0, 100) + '%';
    seg.style.background = SEG_COLORS[i % SEG_COLORS.length];
    bar.appendChild(seg);
  });
  block.appendChild(bar);

  rows.forEach((row, idx) => {
    const usedIds = rows.filter((r, i) => i !== idx && r.id).map(r => r.id);
    const options = items.filter(it => !usedIds.includes(String(it.id)));

    const rowEl = document.createElement('div');
    rowEl.className = 'dist-row';

    const select = document.createElement('select');
    select.innerHTML = '<option value="">Seleccionar…</option>' +
      options.map(o => `<option value="${o.id}" ${String(o.id)===row.id?'selected':''}>${o.nombre}</option>`).join('');
    select.addEventListener('change', e => { row.id = e.target.value; renderDist(); });
    rowEl.appendChild(select);

    const pctWrap = document.createElement('div');
    pctWrap.className = 'pct-wrap';
    const pctInput = document.createElement('input');
    pctInput.type = 'number'; pctInput.min = 0; pctInput.max = 100; pctInput.step = '0.1';
    pctInput.value = row.pct;
    pctInput.addEventListener('input', e => { row.pct = e.target.value; renderDist(); });
    pctWrap.appendChild(pctInput);
    const pctSign = document.createElement('span'); pctSign.textContent = '%';
    pctWrap.appendChild(pctSign);
    rowEl.appendChild(pctWrap);

    const removeBtn = document.createElement('button');
    removeBtn.type = 'button'; removeBtn.className = 'remove'; removeBtn.innerHTML = '&times;';
    removeBtn.title = 'Quitar';
    removeBtn.addEventListener('click', () => { rows.splice(idx, 1); if (!rows.length) rows.push({id:'',pct:''}); renderDist(); });
    rowEl.appendChild(removeBtn);

    block.appendChild(rowEl);
  });

  const addBtn = document.createElement('button');
  addBtn.type = 'button'; addBtn.className = 'btn-add'; addBtn.textContent = '+ agregar ' + dim.label.toLowerCase();
  const usedCount = rows.filter(r => r.id).length;
  addBtn.disabled = usedCount >= items.length;
  addBtn.addEventListener('click', () => { rows.push({ id:'', pct:'' }); renderDist(); });
  block.appendChild(addBtn);

  return block;
}

// =====================================================================
// VALIDACIÓN
// =====================================================================
function validate(){
  const errors = [];
  if (!$('#f_tipo').value) errors.push('Selecciona el tipo de gasto.');
  if (!$('#f_concepto').value) errors.push('Selecciona el concepto de gasto.');
  const valor = parseFloat($('#f_valor_total').value);
  if (!valor || valor <= 0) errors.push('El valor total debe ser mayor a 0.');

  DIMENSIONS.forEach(dim => {
    const rows = distState[dim.key].filter(r => r.id && r.pct !== '');
    if (!rows.length){
      errors.push(`Agrega la distribución de ${dim.label.toLowerCase()}.`);
      return;
    }
    const total = rows.reduce((s, r) => s + (parseFloat(r.pct) || 0), 0);
    if (Math.abs(total - 100) > 0.5){
      errors.push(`${dim.label}: los porcentajes deben sumar 100% (actualmente ${total.toFixed(1)}%).`);
    }
  });

  return errors;
}

function showErrors(errors){
  const box = $('#errList');
  if (!errors.length){ box.style.display = 'none'; box.innerHTML = ''; return; }
  box.style.display = 'block';
  box.innerHTML = 'Revisa lo siguiente antes de guardar:<ul>' + errors.map(e => `<li>${e}</li>`).join('') + '</ul>';
}

// =====================================================================
// GUARDAR GASTO
// =====================================================================
$('#gastoForm').addEventListener('submit', async e => {
  e.preventDefault();
  const errors = validate();
  showErrors(errors);
  if (errors.length) return;

  const btn = $('#btnGuardar');
  btn.disabled = true;
  setStatus('Guardando…');

  const payload = {
    semana: $('#f_semana').value ? parseInt($('#f_semana').value) : null,
    fecha_registro: $('#f_fecha_registro').value || null,
    fecha_pago_programado: $('#f_fecha_pago_prog').value || null,
    proyecto: $('#f_proyecto').value.trim() || null,
    tipo_gasto_id: $('#f_tipo').value,
    concepto_gasto_id: $('#f_concepto').value,
    detalle: $('#f_detalle').value.trim() || null,
    valor_total: parseFloat($('#f_valor_total').value),
    aplica_fondocoop: $('#f_fondocoop').checked,
    aplica_iva: $('#f_iva').checked,
    aplica_renta: $('#f_renta').checked,
    otros_impuestos: $('#f_otros_imp').checked,
    forma_pago_id: $('#f_forma_pago').value || null,
    a_quien_se_abono: $('#f_a_quien').value.trim() || null,
    proveedor: $('#f_proveedor').value.trim() || null,
    estado_id: $('#f_estado').value || null,
    estatus_id: $('#f_estatus').value || null,
  };

  try{
    const { data: gasto, error: gastoErr } = await sb.from('tescom_gastos').insert(payload).select().single();
    if (gastoErr) throw gastoErr;

    for (const dim of DIMENSIONS){
      const rows = distState[dim.key].filter(r => r.id && r.pct !== '');
      const rowsPayload = rows.map(r => ({ gasto_id: gasto.id, [dim.fk]: r.id, porcentaje: parseFloat(r.pct) / 100 }));
      const { error: distErr } = await sb.from(dim.table).insert(rowsPayload);
      if (distErr){
        // deshacemos el gasto si falla alguna distribución (cascada limpia las ya insertadas)
        await sb.from('tescom_gastos').delete().eq('id', gasto.id);
        throw distErr;
      }
    }

    setStatus(`Gasto ${gasto.codigo} guardado correctamente.`, 'ok');
    resetForm();
    loadRecent();
    loadStats();
  } catch (err){
    console.error(err);
    setStatus('No se pudo guardar: ' + (err.message || 'error desconocido'), 'err');
  } finally {
    btn.disabled = false;
  }
});

function resetForm(){
  $('#gastoForm').reset();
  fillConceptos([]);
  resetDistState();
  renderDist();
  showErrors([]);
}
$('#btnLimpiar').addEventListener('click', () => { resetForm(); setStatus(''); });

// =====================================================================
// ÚLTIMOS GASTOS
// =====================================================================
async function loadRecent(){
  const body = $('#recentBody');
  body.innerHTML = '<tr><td colspan="4" class="empty-state">Cargando…</td></tr>';
  const { data, error } = await sb
    .from('tescom_gastos')
    .select('codigo, detalle, valor_total, created_at, tescom_estados(nombre), tescom_estatus(nombre)')
    .order('created_at', { ascending: false })
    .limit(15);

  if (error){ body.innerHTML = `<tr><td colspan="4" class="empty-state">Error al cargar: ${error.message}</td></tr>`; return; }
  if (!data.length){ body.innerHTML = '<tr><td colspan="4" class="empty-state">Aún no hay gastos registrados.</td></tr>'; return; }

  body.innerHTML = data.map(g => `
    <tr>
      <td class="codigo">${g.codigo || '—'}</td>
      <td>${g.detalle || '—'}</td>
      <td>${money(g.valor_total)}</td>
      <td><span class="badge">${g.tescom_estatus?.nombre || g.tescom_estados?.nombre || '—'}</span></td>
    </tr>
  `).join('');
}
$('#btnRefresh').addEventListener('click', loadRecent);

// =====================================================================
// ESTADÍSTICAS DEL MES
// =====================================================================
async function loadStats(){
  const now = new Date();
  const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0, 10);
  const { data, error } = await sb.from('tescom_gastos').select('valor_total').gte('fecha_registro', firstDay);
  if (error){ $('#statCount').textContent = '—'; $('#statTotal').textContent = '—'; return; }
  $('#statCount').textContent = data.length;
  $('#statTotal').textContent = money(data.reduce((s, g) => s + (g.valor_total || 0), 0));
}

// =====================================================================
// AUTENTICACIÓN
// =====================================================================
let currentUser = null;
let appEntered = false;

function showLogin(){
  $('#loginScreen').style.display = 'flex';
  $('#appRoot').style.display = 'none';
}

function showApp(){
  $('#loginScreen').style.display = 'none';
  $('#appRoot').style.display = 'block';
}

async function enterApp(session){
  currentUser = session.user;
  $('#userEmail').textContent = currentUser.email || '';
  showApp();
  if (appEntered) return; // ya se cargaron catálogos/datos, evita duplicar
  appEntered = true;
  $('#f_fecha_registro').value = new Date().toISOString().slice(0, 10);
  renderDist();
  try{
    await loadCatalogs();
    await Promise.all([loadRecent(), loadStats()]);
  } catch (err){
    console.error(err);
    setStatus('No se pudieron cargar los catálogos: ' + (err.message || 'revisa permisos en Supabase'), 'err');
  }
}

function loginErrorMessage(error){
  const raw = error?.message || '';
  if (raw.includes('Invalid login credentials')) return 'Correo o contraseña incorrectos.';
  if (raw.includes('Email not confirmed')) return 'El usuario no está confirmado. En Supabase → Authentication → Users, edítalo y confírmalo (o vuelve a crearlo marcando "Auto Confirm User").';
  return raw || 'No se pudo iniciar sesión.';
}

$('#loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const email = $('#login_email').value.trim();
  const password = $('#login_password').value;
  const btn = $('#btnLogin');
  const errEl = $('#loginError');
  errEl.textContent = '';
  btn.disabled = true; btn.textContent = 'Entrando…';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = 'Iniciar sesión';
  if (error){ errEl.textContent = loginErrorMessage(error); return; }
  if (data?.session) await enterApp(data.session); // no depende únicamente del listener de abajo
});

$('#btnLogout').addEventListener('click', async () => {
  await sb.auth.signOut();
});

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) enterApp(session);
  if (event === 'SIGNED_OUT'){ currentUser = null; appEntered = false; showLogin(); }
});

// =====================================================================
// INIT
// =====================================================================
(async function init(){
  try{
    const { data: { session } } = await sb.auth.getSession();
    if (session) await enterApp(session);
    else showLogin();
  } catch (err){
    console.error(err);
    showLogin();
  }
})();
</script>
</body>
